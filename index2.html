<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Skill</title>
  <style>
    #blue-bordered {
      border: 5px dashed blue;
    }
  </style>
</head>
<body>
  <h1>
    ID Selector:
  </h1> <!-- ID selectors in CSS allow you to target elements (Tags) by their ID values. ID selectors are unique, so you can only apply them to the content of one element. To reference an ID, you precede the ID name with a hash mark (#). -->

  <h2 id="blue-bordered">
    Now we are using an Id Selector
  </h2>
</body>
</html>
