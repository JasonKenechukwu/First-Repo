<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Skill</title>
  <style>
    .box-1 {
      width: 100px;
      height: 100px;
      background-color: red;
      display: inline-block;
    }

    .box-2 {
      width: 100px;
      height: 100px;
      background-color: blue;
      display: inline-block;
      visibility: hidden;
    }

    /* Display: none; removes an element from the view */
    /* Visibility: hidden; hides an element but it still takes up space in the layout */

    .box-3 {
      width: 100px;
      height: 100px;
      background-color: green;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="box-1"></div>
  <div class="box-2"></div>
  <div class="box-3"></div>
</body>
</html>
